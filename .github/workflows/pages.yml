name: Site Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: site-pages-${{ github.event_name == 'pull_request' && github.ref || 'production' }}
  cancel-in-progress: false

jobs:
  validate-and-package:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
      - name: Validate public site
        run: node scripts/validate-site.mjs
      - name: Package public files only
        if: github.event_name != 'pull_request'
        run: |
          set -eu
          mkdir dist
          cp \
            .nojekyll \
            404.html \
            CNAME \
            index.html \
            privacy.html \
            robots.txt \
            sitemap.xml \
            styles.css \
            support.html \
            dist/
      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate-and-package
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Verify live custom domain
        if: vars.CUSTOM_DOMAIN_LIVE == 'true'
        run: |
          check_page() {
            path="$1"
            marker="$2"
            curl --fail --location --retry 5 --retry-all-errors \
              "https://levelstead.com/${path}" | grep --fixed-strings --quiet -- "${marker}"
          }

          check_page "" "Fitness quests without reckless overtraining."
          check_page "privacy.html" "support@levelstead.com"
          check_page "support.html" "support@levelstead.com"
